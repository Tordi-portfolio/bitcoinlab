{% extends "base.html" %}
{% block content %}

<style>
  .container {
    max-width: 600px;
    margin: 40px auto;
    padding: 30px;
    background-color: #ffffff;
    border-radius: 15px;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #2c3e50;
  }

  .message {
    text-align: center;
    font-weight: 600;
    margin-bottom: 15px;
    padding: 10px;
    border-radius: 6px;
  }

  .message.success {
    background-color: #e6f9f0;
    color: #2ecc71;
    border: 1px solid #2ecc71;
  }

  .message.error {
    background-color: #ffe6e6;
    color: #e74c3c;
    border: 1px solid #e74c3c;
  }

  form {
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #333;
  }

  select,
  input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    margin-bottom: 15px;
    font-size: 16px;
    transition: border-color 0.3s ease;
  }

  select:focus,
  input:focus {
    border-color: #3498db;
    outline: none;
  }

  .submit-btn {
    display: block;
    width: 100%;
    background-color: #3498db;
    color: white;
    padding: 12px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  .submit-btn:hover {
    background-color: #2980b9;
  }

  @media (max-width: 500px) {
    .container {
      margin: 20px;
      padding: 20px;
    }

    select,
    input[type="number"] {
      font-size: 14px;
    }

    .submit-btn {
      font-size: 14px;
    }
  }
</style>

<div class="container">
  <h2>Edit User Bitcoin Balance</h2>

  {% if messages %}
    {% for message in messages %}
      <div class="message {% if message.tags == 'success' %}success{% else %}error{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <!-- User Selection -->
  <form method="get">
    <label for="user">Select User</label>
    <select name="user_id" onchange="this.form.submit()">
      <option value="">-- Choose a user --</option>
      {% for user in users %}
        <option value="{{ user.id }}" {% if user.id|stringformat:"s" == selected_user_id %}selected{% endif %}>
          {{ user.username }}
        </option>
      {% endfor %}
    </select>
  </form>

  {% if selected_wallet %}
  <!-- Balance Update Form -->
  <form method="POST">
    {% csrf_token %}
    <input type="hidden" name="user" value="{{ selected_wallet.user.id }}">
    
    <label for="balance">Balance for {{ selected_wallet.user.username }}</label>
    <input type="number" step="0.00000001" name="balance" value="{{ selected_wallet.bitcoin_balance }}" required>

    <button type="submit" class="submit-btn">Update Balance</button>
  </form>
  {% endif %}
</div>

{% endblock %}
